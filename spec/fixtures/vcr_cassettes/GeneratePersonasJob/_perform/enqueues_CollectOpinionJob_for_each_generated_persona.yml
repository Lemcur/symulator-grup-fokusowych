        Lewandowska\",\"description\":\"32-letnia nauczycielka angielskiego w liceum
        w Krakowie. Mieszka sama w starym mieszkaniu na Podgórzu, która wyremontowała
        sama. Od lat chciała nauczyć się włoskiego, aby móc czytać oryginalne teksty
        oraz lepiej komunikować się z babcią ze Szczecina, która pochodzi z Włoch.
        Uczy przez cały dzień, wieczorami jest zmęczona, ale czuje się winę, że nie
        dokończyła tego, co zaczęła.\",\"demographics_extras\":{\"miasto\":\"Kraków\",\"zawod\":\"Nauczycielka
