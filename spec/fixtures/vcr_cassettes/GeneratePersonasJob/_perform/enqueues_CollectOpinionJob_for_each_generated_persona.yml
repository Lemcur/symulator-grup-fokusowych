        8-16, aktywnie spędza weekendy na spacerach po Krakowie, chodzi na wystawy
        i do kin studyjnych. Unika dużych wydatków, dbając o oszczędności na remont.
        Czasami poczucie winy, że zamiast uczyć włoskiego, scrolluje telefon.\",\"obawy_zakupowe\":[\"obawiam
        się że kolejna aplikacja będzie nudna i powtarzająca się jak podręczniki szkolne\",\"nie
        chcę wydawać dużo pieniędzy na abonament, mam już Netflixa i sportowca\",\"boje
        się że włoski wymaga zbyt dużo systematycznej pracy, żeby to utrzymać\"],\"styl_komunikacji\":\"Refleksyjny,
        miękki, czasami samokrytyczny, lubi dyskutować o motywacji zamiast tylko o
        faktach\"}}\n\nTWOJE ZADANIE: krytycznie oceń tę personę i POPRAW ją.\n\nSprawdź
        każdy z punktów:\n1. Czy jest zbyt idealizowana? (np. \"kochająca rodzinę
        + rozwinięta zawodowo + ekologicznie świadoma\" = TAK, popraw)\n2. Czy ma
        realistyczne wady, ograniczenia budżetowe, niepewności, sprzeczności?\n3.
        Czy detail (miasto, zawód, kontekst) jest konkretny czy generyczny?\n4. Czy
        styl komunikacji odzwierciedla jej tło demograficzne i zawodowe?\n5. Czy obawy
        zakupowe są specyficzne dla TEGO produktu, nie generyczne (\"czy będzie warte
