        te same wartości pól demographics (wiek, płeć, miejsce_zamieszkania).\nMożesz
        zmienić imię, miasto, zawód, opis, wszystkie traits.\n"}]}],"stream":false,"max_tokens":64000,"output_config":{"format":{"type":"json_schema","schema":{"type":"object","properties":{"name":{"type":"string","description":"Pełne
